<!DOCTYPE html>

<script>

    // ===============================
// 🔹 FOR LOOP EXAMPLES
// ===============================

// 1. FOR LOOP – Counting (1 to 10)
for (let i = 1; i <= 10; i++) {
  console.log(i);
}

// 2. FOR LOOP – Even Numbers (1 to 20)
for (let i = 2; i <= 20; i += 2) {
  console.log(i);
}

// 3. FOR LOOP – Table of 5
for (let i = 1; i <= 10; i++) {
  console.log(5 * i);
}



// ===============================
// 🔹 WHILE LOOP EXAMPLES
// ===============================

// 1. WHILE LOOP – Counting (1 to 10)
let a = 1;
while (a <= 10) {
  console.log(a);
  a++;
}

// 2. WHILE LOOP – Even Numbers (1 to 20)
let b = 2;
while (b <= 20) {
  console.log(b);
  b += 2;
}

// 3. WHILE LOOP – Table of 5
let c = 1;
while (c <= 10) {
  console.log(5 * c);
  c++;
}
</script>
